# GitLab CI/CD — секреты, сборка, контейнеры, фаззинг
# Проверка безопасности образа (Trivy) выполняется ДО публикации в реестр

stages:
  - security
  - build
  - container   # Сборка образа → сканирование → публикация (только при отсутствии уязвимостей)
  - fuzzing

variables:
  GIT_DEPTH: 0

# ─── Этап 1: Поиск секретов (Gitleaks) ───
secret-detection:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --no-banner --verbose --exit-code 1
  artifacts:
    when: on_failure
    paths:
      - gitleaks-report.json
  allow_failure: false

# ─── Этап 2: Сборка Java (Maven) ───
build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean compile -B
  cache:
    key: maven
    paths:
      - .m2/repository

# ─── Этап 3: Сборка Docker-образа, проверка безопасности, публикация в GitLab Container Registry ───
# Публикация выполняется ТОЛЬКО при отсутствии уязвимостей HIGH/CRITICAL
container:
  stage: container
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - IMAGE_TAG=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker build -t $IMAGE_TAG .
    - docker save -o image.tar $IMAGE_TAG
    # Сканирование: при обнаружении HIGH/CRITICAL — pipeline завершится, push не выполнится
    - docker run --rm -v $PWD:/src -w /src aquasec/trivy:latest image --input image.tar --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed
    - docker push $IMAGE_TAG
    - docker tag $IMAGE_TAG $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest

# ─── Этап 4: Фаззинг (ffuf) — по аналогии с DAST ───
# Запускается только если задана переменная FUZZ_TARGET_URL (Settings → CI/CD → Variables)
# Например: https://staging.example.com или URL Review App
fuzzing:
  stage: fuzzing
  image: golang:1.22
  before_script:
    - go install github.com/ffuf/ffuf/v2@latest
  script:
    - export PATH=$PATH:$(go env GOPATH)/bin
    - |
      if [ -z "${FUZZ_TARGET_URL:-}" ]; then
        echo "FUZZ_TARGET_URL not set (Settings → CI/CD → Variables), skipping"
        echo '{"results":[]}' > fuzz-report.json
        exit 0
      fi
      TARGET=$(echo "$FUZZ_TARGET_URL" | sed 's|/$||')
      ffuf -w fuzz-wordlist.txt -u "${TARGET}/FUZZ" -mc 200,201,301,302,401,403,405,500 -maxtime 120 -noninteractive -o fuzz-report.json -of json
  artifacts:
    when: always
    paths:
      - fuzz-report.json
