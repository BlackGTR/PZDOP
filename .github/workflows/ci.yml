# GitHub Actions — интеграция обнаружения секретов
# Сканирование выполняется ДО сборки; сборка останавливается при обнаружении секретов

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─── Job 1: Поиск секретов (Gitleaks) — выполняется первым ───
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_FAIL: true
          GITLEAKS_VERBOSE: true

  # ─── Job 2: Сборка Java (Maven) — только при успешном secret-detection ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -B
