# GitHub Actions — интеграция обнаружения секретов
# Сканирование выполняется ДО сборки; сборка останавливается при обнаружении секретов

name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─── Job 1: Поиск секретов (Gitleaks) — выполняется первым ───
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_FAIL: true
          GITLEAKS_VERBOSE: true

  # ─── Job 2: Сборка Java (Maven) — только при успешном secret-detection ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        if: hashFiles('**/pom.xml') != ''
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build with Maven
        if: hashFiles('**/pom.xml') != ''
        run: mvn clean compile -B

      - name: Skip build (no pom.xml)
        if: hashFiles('**/pom.xml') == ''
        run: echo "pom.xml not found, skipping build"

  # ─── Job 3: Фаззинг веб-приложения (ffuf) — по аналогии с DAST ───
  # Задайте FUZZ_TARGET_URL в Settings → Secrets and variables → Actions (Variables)
  fuzzing:
    name: Fuzzing
    runs-on: ubuntu-latest
    needs: [secret-detection]
    steps:
      - uses: actions/checkout@v4

      - name: Install ffuf
        run: |
          curl -sSfL https://github.com/ffuf/ffuf/releases/download/v2.1.0/ffuf_2.1.0_linux_amd64.tar.gz | tar -xz -C /usr/local/bin ffuf

      - name: Run ffuf
        env:
          FUZZ_TARGET_URL: ${{ vars.FUZZ_TARGET_URL }}
        run: |
          if [ -z "$FUZZ_TARGET_URL" ]; then
            echo "FUZZ_TARGET_URL not set, skipping"
            echo '{"results":[]}' > fuzz-report.json
            exit 0
          fi
          TARGET=$(echo "$FUZZ_TARGET_URL" | sed 's|/$||')
          ffuf -w fuzz-wordlist.txt -u "${TARGET}/FUZZ" -mc 200,201,301,302,401,403,405,500 -maxtime 120 -noninteractive -o fuzz-report.json -of json

      - name: Upload fuzz report
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-report
          path: fuzz-report.json

  # ─── Job 4: Docker-образ — сборка, проверка безопасности (Trivy), публикация в ghcr.io ───
  # Публикация выполняется ТОЛЬКО при отсутствии уязвимостей HIGH/CRITICAL
  container:
    name: Build, Scan & Push Image
    runs-on: ubuntu-latest
    needs: [secret-detection]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ env.IMAGE }} .
          docker tag ${{ env.IMAGE }} ghcr.io/${GITHUB_REPOSITORY,,}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Push to GitHub Container Registry
        run: |
          docker push ${{ env.IMAGE }}
          docker push ghcr.io/${GITHUB_REPOSITORY,,}:latest
